{% extends "EnhanceLearn/dosen/base-dosen.html" %}

{% block content %}

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
    /* Container utama reusable */
    .main-container-shadow {
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        border-radius: 20px;
    }

    /* Shadow biru untuk card di dalam */
    .blue-shadow {
        box-shadow: 0 8px 20px rgba(13, 110, 253, 0.15);
        transition: 0.3s ease;
        border: 1px solid rgba(13, 110, 253, 0.05);
    }

    .blue-shadow:hover {
        box-shadow: 0 12px 30px rgba(13, 110, 253, 0.25);
        transform: translateY(-4px);
    }
</style>

<div class="px-2 py-2" style="background-color:#f8f9fa; ">
    
    <div class="container bg-white px-4 p-md-5 main-container-shadow">

        <!-- Judul halaman -->
        <div class="mb-5">
            <h2 class="fw-bold text-dark mb-1">
                {% block page_title %}{% endblock %}
            </h2>
            <div style="width:60px;height:5px;background:#0d6efd;border-radius:10px;"></div>
        </div>

        <!-- Isi halaman -->
        {% block page_content %}
        {% endblock %}

    </div>
    
</div>


<!-- SWEETALERT GLOBAL NOTIFICATION -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

{% if messages %}
<script>
document.addEventListener("DOMContentLoaded", function() {

    {% for message in messages %}
    
    Swal.fire({
        icon: "{{ message.tags|default:'success' }}",
        title: "{{ message.tags|title }}",
        text: "{{ message|escapejs }}",
        showConfirmButton: false,
        timer: 2000,
        timerProgressBar: true
    });

    {% endfor %}

});
</script>
{% endif %}


{% endblock %}
