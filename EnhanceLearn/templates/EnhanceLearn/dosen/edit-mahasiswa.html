{% extends "EnhanceLearn/dosen/content.html" %}

{% block page_title %}
Edit Mahasiswa
{% endblock %}

{% block page_content %}

<div class="card border-0 shadow-sm rounded-4">

<div class="card-body p-4">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Nama</label>
<input type="text" name="nama" class="form-control"
value="{{ mhs.user.first_name }}">
</div>

<div class="mb-3">
<label>NIM</label>
<input type="text" name="nim" class="form-control"
value="{{ mhs.user.username }}">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control"
value="{{ mhs.user.email }}">
</div>

<button class="btn btn-primary">
Simpan Perubahan
</button>

<a href="{% url 'data_mahasiswa' %}" class="btn btn-secondary">
Kembali
</a>

</form>

</div>

</div>

{% endblock %}
