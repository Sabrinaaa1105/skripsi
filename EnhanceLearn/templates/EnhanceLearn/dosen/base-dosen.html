{% load static %}

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}EnhanceLearn - Dosen{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS Global -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}?v=2">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar-custom">
    <span class="navbar-brand">
        <span class="brand-enhance">Enhance</span><span class="brand-learn">Learn</span>
    </span>

    <!-- TAMBAHAN HALO USER + DROPDOWN -->
    {% if request.user.is_authenticated %}
    <div style="margin-left:auto; display:flex; align-items:center;">

        <div class="dropdown">
            <a class="d-flex align-items-center text-decoration-none dropdown-toggle"
            href="#"
            id="userDropdown"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            style="color:inherit;">

                <i class="bi bi-person-circle me-2"></i>
                Halo, {{ request.user.first_name }}!
            </a>

            <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                <li>
                    <a class="dropdown-item text-danger" href="{% url 'logout_dosen' %}">
                        <i class="bi bi-box-arrow-right me-2"></i> Logout
                    </a>
                </li>
            </ul>
        </div>

    </div>
    {% endif %}

</nav>

<!-- ================= MAIN LAYOUT ================= -->
<div class="layout">

    <!-- ========== SIDEBAR DOSEN ========== -->
    <aside class="sidebar">

        <a href="{% url 'dashboard_dosen' %}" class="sidebar-link">
            <i class="bi bi-speedometer2 me-2"></i> Dashboard
        </a>

        <a href="{% url 'data_kelas' %}" class="sidebar-link">
            <i class="bi bi-folder2-open me-2"></i> Data Kelas
        </a>

        <a href="{% url 'data_mahasiswa' %}" class="sidebar-link">
            <i class="bi bi-people-fill me-2"></i> Data Mahasiswa
        </a>

        <a href="{% url 'progres_mahasiswa' %}" class="sidebar-link">
            <i class="bi bi-graph-up-arrow me-2"></i> Progres Mahasiswa
        </a>

        <a href="{% url 'data_nilai' %}" class="sidebar-link">
            <i class="bi bi-clipboard-data me-2"></i> Data Nilai Mahasiswa
        </a>

    </aside>

    <!-- ========== CONTENT ========== -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>

</div>

<!-- ================= SCRIPT ================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const currentPath = window.location.pathname;

    document.querySelectorAll(".sidebar-link").forEach(link => {
        if (link.getAttribute("href") === currentPath) {
            link.classList.add("active");
        }
    });

});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
