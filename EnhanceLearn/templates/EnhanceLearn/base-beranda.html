{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}EnhanceLearn{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/beranda.css' %}">
</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="#">
            <em>Enhance<span>Learn</span></em>
        </a>

        <!-- Tombol Hamburger HP -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'beranda' %}">Beranda</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'materi' %}">
                        Daftar Materi
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Petunjuk
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'tentang' %}">
                        Tentang
                    </a>
                </li>
            </ul>

            <div class="d-flex auth-buttons">
                <a href="{% url 'register_mhs' %}"
                   class="btn btn-outline-secondary me-2">
                    Daftar
                </a>

                <a href="{% url 'login' %}"
                   class="btn btn-primary-custom">
                    Masuk
                </a>
            </div>

        </div>
    </div>
</nav>

<!-- ===== KONTEN ===== -->
{% block content %}
{% endblock %}

<!-- ===== FOOTER ===== -->
<footer>
    © 2026 EnhanceLearn — Media Pembelajaran Interaktif Citra Digital
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
