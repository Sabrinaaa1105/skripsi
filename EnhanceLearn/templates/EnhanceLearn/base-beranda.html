{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>{% block title %}EnhanceLearn{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/beranda.css' %}">
</head>

<body class="{% block body_class %}{% endblock %}">

<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="{% url 'beranda' %}">
            <em>Enhance<span>Learn</span></em>
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a href="{% url 'beranda' %}"
                       class="nav-link {% if request.resolver_match.url_name == 'beranda' %}active{% endif %}">
                        Beranda
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{% url 'materi' %}"
                       class="nav-link {% if request.resolver_match.url_name == 'materi' %}active{% endif %}">
                        Daftar Materi
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{% url 'petunjuk' %}"
                       class="nav-link {% if request.resolver_match.url_name == 'petunjuk' %}active{% endif %}">
                        Petunjuk
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{% url 'tentang' %}"
                       class="nav-link {% if request.resolver_match.url_name == 'tentang' %}active{% endif %}">
                        Tentang
                    </a>
                </li>

            </ul>

            <div class="d-flex auth-buttons">

                <a href="{% url 'register_mhs' %}"
                   class="btn btn-outline-secondary me-2">
                    Daftar
                </a>

                <a href="{% url 'login' %}"
                   class="btn btn-primary-custom">
                    Masuk
                </a>

            </div>

        </div>

    </div>
</nav>

{% block content %}
{% endblock %}

<footer>
    © 2026 EnhanceLearn — Media Pembelajaran Interaktif Citra Digital
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
