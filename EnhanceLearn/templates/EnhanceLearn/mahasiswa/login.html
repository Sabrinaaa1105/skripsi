{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Mahasiswa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/beranda.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'beranda' %}">
            Enhance<span>Learn</span>
        </a>

        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'beranda' %}">Beranda</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Daftar Materi</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Petunjuk</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Tentang</a></li>
            </ul>

            <div class="d-flex">
                <a href="{% url 'register_mhs' %}" class="btn btn-outline-secondary me-2">Daftar</a>
                <a href="{% url 'login' %}" class="btn btn-primary-custom">Masuk</a>
            </div>
        </div>
    </div>
</nav>

<!-- ===== LOGIN SECTION ===== -->
<div class="container my-5">
    <div class="row align-items-center">

        <!-- KOLOM KIRI -->
        <div class="col-lg-6 d-none d-lg-flex justify-content-center">
            <img src="{% static 'img/login.png' %}" 
                 alt="Login Illustration" 
                 class="img-fluid"
                 style="max-width: 70%;">
        </div>

        <!-- KOLOM KANAN -->
        <div class="col-lg-6">
            <div class="auth-container mx-auto">

                <h2 class="auth-title text-center">LOG IN</h2>

                <form method="POST">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" required placeholder="Masukkan Email">
                    </div>

                    <div class="form-group">
                        <label>Kata Sandi</label>
                        <input type="password" name="password" required placeholder="Masukkan kata sandi">
                    </div>

                    <button type="submit" class="btn-auth w-100">Masuk</button>
                </form>

                <br>
                <div class="auth-footer text-center">
                    Belum punya akun?
                    <a href="{% url 'register_mhs' %}">Daftar</a>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
    © 2026 EnhanceLearn — Media Pembelajaran Interaktif Citra Digital
</footer>

</body>
</html>
