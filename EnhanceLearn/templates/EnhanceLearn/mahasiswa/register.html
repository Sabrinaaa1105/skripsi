{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar Mahasiswa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/beranda.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="{% url 'beranda' %}">
            <em>Enhance<span>Learn</span></em>
        </a>

        <!-- Tombol Hamburger -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'beranda' %}">
                        Beranda
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Daftar Materi
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Petunjuk
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Tentang
                    </a>
                </li>
            </ul>

            <div class="d-flex auth-nav-buttons">
                <a href="{% url 'register_mhs' %}"
                   class="btn btn-outline-secondary me-2">
                    Daftar
                </a>

                <a href="{% url 'login' %}"
                   class="btn btn-primary-custom">
                    Masuk
                </a>
            </div>

        </div>

    </div>
</nav>

<!-- ===== REGISTER SECTION ===== -->
<div class="container my-5">
    <div class="row align-items-start">

        <!-- KOLOM KIRI (ILUSTRASI) -->
        <div class="col-lg-6 d-none d-lg-flex justify-content-center">
            <img src="{% static 'img/regis.png' %}"
                 alt="Register Illustration"
                 class="img-fluid"
                 style="max-width:90%; margin-top:50px;">
        </div>

        <!-- KOLOM KANAN (FORM) -->
        <div class="col-lg-6">

            <div class="auth-container mx-auto register-box"
                 style="margin-top:-40px;">

                <h2 class="auth-title text-center">
                    DAFTAR
                </h2>

                <form method="POST">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text"
                               name="nama"
                               required
                               placeholder="Masukkan nama lengkap">
                    </div>

                    <div class="form-group">
                        <label>NIM</label>
                        <input type="text"
                               name="nim"
                               required
                               placeholder="Masukkan NIM">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email"
                               name="email"
                               required
                               placeholder="Masukkan email">
                    </div>

                    <div class="form-group">
                        <label>Token Kelas</label>
                        <input type="text"
                               name="token"
                               required
                               placeholder="Masukkan token dari dosen">
                    </div>

                    <!-- PASSWORD -->
                    <div class="row">

                        <div class="col-md-6 form-group">
                            <label>Kata Sandi</label>
                            <input type="password"
                                   name="password"
                                   required
                                   placeholder="Masukkan kata sandi">
                        </div>

                        <div class="col-md-6 form-group">
                            <label>Ulangi Kata Sandi</label>
                            <input type="password"
                                   name="password2"
                                   required
                                   placeholder="Ulangi kata sandi">
                        </div>

                    </div>

                    <button type="submit" class="btn-auth w-100">
                        DAFTAR
                    </button>

                </form>

                <br>

                <div class="auth-footer text-center">
                    Sudah punya akun?
                    <a href="{% url 'login' %}">
                        Masuk
                    </a>

                    <br>

                    Daftar sebagai dosen?
                    <a href="{% url 'register_dosen' %}">
                        Daftar
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
    © 2026 EnhanceLearn — Media Pembelajaran Interaktif Citra Digital
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
