{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Mahasiswa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="{% static 'css/beranda.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">

    <style>
        /* CSS Tambahan agar posisi ikon pas di dalam input group */
        
        html,
        body{
            overscroll-behavior-y: none;
        }

        .password-container {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            z-index: 10;
            color: #6c757d;
        }
        .form-group input {
            padding-right: 45px; /* Memberi ruang agar teks tidak tertutup ikon */
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="{% url 'beranda' %}">
            <em>Enhance<span>Learn</span></em>
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'beranda' %}">
                        Beranda
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Daftar Materi
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Petunjuk
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Tentang
                    </a>
                </li>
            </ul>

            <div class="d-flex auth-nav-buttons">
                <a href="{% url 'register_mhs' %}"
                   class="btn btn-outline-secondary me-2">
                    Daftar
                </a>

                <a href="{% url 'login' %}"
                   class="btn btn-primary-custom">
                    Masuk
                </a>
            </div>

        </div>

    </div>
</nav>

<div class="container my-5">
    <div class="row align-items-start">

        <div class="col-lg-6 d-none d-lg-flex justify-content-center">
            <img src="{% static 'img/regis.png' %}"
                 alt="Register Illustration"
                 class="img-fluid"
                 style="max-width:90%; margin-top:50px;">
        </div>

        <div class="col-lg-6">

            <div class="auth-container mx-auto register-box"
                 style="margin-top:-40px;">

                <h2 class="auth-title text-center">
                    DAFTAR
                </h2>

                <form method="POST">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text"
                               name="nama"
                               required
                               placeholder="Masukkan nama lengkap">
                    </div>

                    <div class="form-group">
                        <label>NIM</label>
                        <input type="text"
                               name="nim"
                               required
                               placeholder="Masukkan NIM">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email"
                               name="email"
                               required
                               placeholder="Masukkan email">
                    </div>

                    <div class="form-group">
                        <label>Token Kelas</label>
                        <input type="text"
                               name="token"
                               required
                               placeholder="Masukkan token dari dosen">
                    </div>

                    <div class="row">

                        <div class="col-md-6 form-group">
                            <label>Kata Sandi</label>
                            <div class="password-container">
                                <input type="password"
                                       id="password"
                                       name="password"
                                       required
                                       placeholder="Masukkan kata sandi">
                                <i class="bi bi-eye-slash toggle-password" onclick="togglePass('password', this)"></i>
                            </div>
                        </div>

                        <div class="col-md-6 form-group">
                            <label>Ulangi Kata Sandi</label>
                            <div class="password-container">
                                <input type="password"
                                       id="password2"
                                       name="password2"
                                       required
                                       placeholder="Ulangi kata sandi">
                                <i class="bi bi-eye-slash toggle-password" onclick="togglePass('password2', this)"></i>
                            </div>
                        </div>

                    </div>

                    <button type="submit" class="btn-auth w-100">
                        DAFTAR
                    </button>

                </form>

                <br>

                <div class="auth-footer text-center">
                    Sudah punya akun?
                    <a href="{% url 'login' %}">
                        Masuk
                    </a>

                    <br>

                    Daftar sebagai dosen?
                    <a href="{% url 'register_dosen' %}">
                        Daftar
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

<footer>
    © 2026 EnhanceLearn — Media Pembelajaran Interaktif Citra Digital
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function togglePass(inputId, iconElement) {
        const passwordInput = document.getElementById(inputId);
        
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            // Mengubah ikon menjadi mata terbuka
            iconElement.classList.remove("bi-eye-slash");
            iconElement.classList.add("bi-eye");
        } else {
            passwordInput.type = "password";
            // Mengubah ikon kembali menjadi mata dicoret
            iconElement.classList.remove("bi-eye");
            iconElement.classList.add("bi-eye-slash");
        }
    }
</script>

</body>
</html>
